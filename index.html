 <!DOCTYPE html>
<html>
<head>
  <title>🔥 Cool Todo App</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: linear-gradient(to right, #667eea, #764ba2);
      color: white;
    }

    h2 {
      margin-top: 20px;
    }

    input {
      padding: 10px;
      width: 200px;
      border: none;
      border-radius: 5px;
    }

    button {
      padding: 10px;
      margin-left: 5px;
      border: none;
      border-radius: 5px;
      background: #ff7eb3;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #ff4f91;
    }

    li {
      list-style: none;
      margin: 10px auto;
      padding: 10px;
      width: 250px;
      background: white;
      color: black;
      border-radius: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .done {
      text-decoration: line-through;
      color: gray;
    }
  </style>
</head>
<body>

<h2>✨ My Cool Todo List</h2>

<input id="task" placeholder="Enter task">
<button onclick="addTask()">Add</button>

<ul id="list"></ul>

<script>
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

function render() {
  let list = document.getElementById("list");
  list.innerHTML = "";

  tasks.forEach((task, index) => {
    let li = document.createElement("li");

    let span = document.createElement("span");
    span.innerText = task.text;
    if (task.done) span.classList.add("done");

    span.onclick = () => {
      tasks[index].done = !tasks[index].done;
      save();
    };

    let delBtn = document.createElement("button");
    delBtn.innerText = "❌";
    delBtn.onclick = () => {
      tasks.splice(index, 1);
      save();
    };

    li.appendChild(span);
    li.appendChild(delBtn);
    list.appendChild(li);
  });
}

function addTask() {
  let input = document.getElementById("task");

  if (input.value === "") return;

  tasks.push({ text: input.value, done: false });

  input.value = "";
  save();
}

function save() {
  localStorage.setItem("tasks", JSON.stringify(tasks));
  render();
}

render();
</script>

</body>
</html>
